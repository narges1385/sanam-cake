<!DOCTYPE html>
<html>

<head>
    <title>CakeFilling</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <style>
        @font-face {
            font-family: "font";
            src: url("fonts/El_Messiri/ElMessiri-VariableFont_wght.ttf"), url("fonts/Vazirmatn/Vazirmatn-VariableFont_wght.ttf");
            font-weight: bold;
            font-display: swap;
        }

        body {
            background-color: rgb(45, 96, 81);
            font-family: "font";
        }

        .main {
            text-align: center;
            margin: 3%;
            border-radius: 40px;
            padding: 1% 0;
            box-shadow: 6px 6px 15px rgb(53, 53, 53), -6px -6px 15px rgb(53, 53, 53);
            background-color: rgb(96, 165, 145);
            padding-bottom: 30px;
            font-size: 18px;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 0 15px;
        }

        h1 {
            color: rgba(23, 47, 44, 0.8);
            font-size: 20px;
        }

        a {
            color: rgba(23, 47, 44, 0.8);
        }

        img {
            width: 100%;
        }

        p {
            margin: 20px 15px 20px 10px;
            margin-bottom: 10px;
            padding: 10px;
            text-align: center;
            border: 2px solid rgb(91, 73, 7);
            background-color: rgb(186, 166, 84);
            color: rgb(72, 44, 4);
            box-shadow: 6px 6px 0 rgb(159, 106, 71);
        }

        .right1 {
            margin-left: 30vw;
            border-radius: 30px 30px 0 30px;
        }

        .left1 {
            margin-right: 30vw;
            border-radius: 30px 30px 30px 0;
        }

        .right2 {
            margin-left: 30vw;
            border-radius: 30px 0 30px 30px;
        }

        .left2 {
            margin-right: 30vw;
            border-radius: 0 30px 30px 30px;
        }

        .about{
            display: flex;
            align-items: center;
            justify-content: flex-end;
            margin-right: 5px;
        }

        .text{
            margin: 3px;
            padding: 1vw;
            border-radius: 50px;
            color: rgb(81, 61, 6);
            font-size: 18px;
        }

        .price {
            display: inline-block;
            direction: rtl;
            background-color: rgb(141, 122, 98);
            padding: 10px;
            border-radius: 30px;
            border: 2px solid rgb(41, 83, 78);
            color: rgb(23, 47, 44);
        }
    </style>
</head>

<body>
    <div class="main">
        <header>
            <a href="index.html">
                <svg class="w-6 h-6 text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24">
                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.5 8.046H11V6.119c0-.921-.9-1.446-1.524-.894l-5.108 4.49a1.2 1.2 0 0 0 0 1.739l5.108 4.49c.624.556 1.524.027 1.524-.893v-1.928h2a3.023 3.023 0 0 1 3 3.046V19a5.593 5.593 0 0 0-1.5-10.954Z" />
                </svg>
            </a>
            <h1>فیلینگ کیک</h1>
        </header>
        <div class="about">
            <div class="text">...قیمت هر کیلو کیک با فیلینگِ</div>
            <svg class="w-6 h-6 text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                <path stroke="rgb(81, 61, 6)" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.83892 12.4543s1.24988-3.08822-.21626-5.29004C8.15656 4.96245 4.58671 4.10885 4.39794 4.2436c-.18877.13476-1.11807 3.32546.34803 5.52727 1.4661 2.20183 5.09295 2.68343 5.09295 2.68343Zm0 0C10.3389 13.4543 12 15 12 18v2c0-2-.4304-3.4188 2.0696-5.9188m0 0s-.4894-2.7888 1.1206-4.35788c1.6101-1.56907 4.4903-1.54682 4.6701-1.28428.1798.26254.4317 2.84376-1.0809 4.31786-1.61 1.5691-4.7098 1.3243-4.7098 1.3243Z"/>
            </svg>
        </div>
        <p class="right1">توت فرنگی + موز + گردو</p>
        <div class="price right2">تومان 1,600,000</div>
        <p class="left1">شاتوت + پسته</p>
        <div class="price left2">تومان 1,300,000</div>
        <img src="photo/filling.JPG">
        <p class="right2">پرک بادام + آناناس + کارامل</p>
        <div class="price right2">تومان 1,700,000</div>
        <p class="left2">شکلات + موز + گردو</p>
        <div class="price left2">تومان 1,200,000</div>
    </div>
</body>

</html>
