<!DOCTYPE html>
<html>

<head>
    <title>CheeseCake</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        @font-face {
            font-family: "font";
            src: url("fonts/El_Messiri/ElMessiri-VariableFont_wght.ttf"), url("fonts/Vazirmatn/Vazirmatn-VariableFont_wght.ttf");
            font-weight: bold;
            font-display: swap;
        }

        body {
            font-family: "font";
            margin: 0;
            background-color: rgb(45, 27, 0);
            background-image: url(photo/IMG_3796.JPG);
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            flex-direction: column;
            margin-bottom: 30px;
        }

        .main{
            width: 375px;
        }

        header {
            display: flex;
            align-items: center;
            margin: 0 10px;
            gap: 200px;
        }

        h1 {
            color: rgb(105, 81, 44);
        }

        a {
            color: rgb(105, 81, 44);
        }

        .about {
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: rgba(240, 248, 255, 0.479);
        }

        .name {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .about svg {
            margin: 0 10px;
        }

        .price {
            margin-left: 30px;
            direction: rtl;
        }

        .about-price {
            margin-right: 25px;
        }

        h2 {
            font-size: 20px;
            color: rgba(240, 248, 255, 0.479);
        }

        .mini-name {
            display: flex;
            justify-content: flex-end;
            gap: 5px;
            margin: 50px 10px 0 0;
        }

        ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
        }

        li {
            display: flex;
            text-align: center;
            justify-content: space-between;
            margin-top: 15px;
        }

        li img {
            width: 160px;
            height: auto;
            border-radius: 50%;
            border: 2px solid rgb(69, 41, 5);
            box-shadow: 10px 10px 10px rgb(50, 25, 3);
            margin-left: 10px;
        }

        .text {
            background-image: url(photo/backcheeseJPG.JPG);
            background-repeat: no-repeat;
            background-size: cover;
            width: 110px;
            border-radius: 50%;
            border: 2px solid rgb(69, 41, 5);
            text-align: center;
            padding: 25px;
            font-size: 25px;
            text-shadow: 2px 2px rgb(120, 109, 109);
            color: rgb(44, 27, 3);
            box-shadow: 10px 10px 10px rgb(50, 25, 3);
            margin-right: 10px;
        }

        .mini {
            display: grid;
            grid-template-columns: 160px 160px;
            row-gap: 15px;
            column-gap: 20px;
            justify-content: center;
            margin-right: 25px;
        }

        .mini img {
            width: 160px;
            border-radius: 200px;
            box-shadow: 10px 10px 10px rgb(50, 25, 3);
            border: 5px solid rgb(60, 36, 5);
            margin: 0 5px;
        }

        @media screen and (min-width: 768px) {
            .main {
                margin: 0 25%;
            }
            header{
                gap: 400px;
            }
        }
    </style>
</head>
