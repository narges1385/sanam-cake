<!DOCTYPE html>
<html>

<head>
    <title>Dessert</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        @font-face {
            font-family: "font";
            src: url("fonts/El_Messiri/ElMessiri-VariableFont_wght.ttf"), url("fonts/Vazirmatn/Vazirmatn-VariableFont_wght.ttf");
            font-weight: bold;
            font-display: swap;
        }

        body {
            background-color: rgb(90, 77, 61);
            font-family: "font";
        }

        .main {
            text-align: center;
            margin: 6% 3%;
            border-radius: 30px;
            padding: 1% 0;
            box-shadow: 3px 3px 10px rgb(46, 46, 46), -3px -3px 10px rgb(46, 46, 46);
            background-color: rgb(193, 178, 159);
            padding-bottom: 20px;
        }

        .container {
            display: flex;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 0 15px;
        }

        h1 {
            color: rgb(71, 61, 49);
            font-size: 20px;
        }

        a {
            color: rgb(67, 57, 45);
        }

        img {
            width: 40%;
            height: auto;
            border-radius: 200px;
            margin: 20px 10px 10px 20px;
            margin-right: 0;
            box-shadow: 2px 2px 5px rgb(69, 69, 69), -2px -2px 5px rgb(69, 69, 69);
        }

        .text {
            display: flex;
            flex-direction: column;
            margin: 60px auto 0 auto;
        }

        .name{
            display: flex;
            flex-direction: row-reverse;
            align-items: center;
            margin: 5px;
            margin-right: 3px;
            color: rgb(45, 45, 91);
            height: 35px;
        }

        .p1 {
            border-radius: 50px 20px 20px 0;
            font-size: 17px;
        }

        .p2 {
            color: rgb(200, 197, 189);
            border-radius: 50px 50px 50px 0;
            padding: 5px;
            background-color: rgb(113, 92, 76);
            margin-top: 0;
            font-size: 17px;
        }

        @media screen and (min-width: 768px){
            .main{
                width: 500px;
                margin: 3% auto;
            }
            img{
                margin-left: 50px;
            }
        }

    </style>
</head>

<body>
    <div class="main">
        <header>
            <a href="index.html">
                <svg class="w-6 h-6 text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="30" height="30" fill="none" viewBox="0 0 24 24">
                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.5 8.046H11V6.119c0-.921-.9-1.446-1.524-.894l-5.108 4.49a1.2 1.2 0 0 0 0 1.739l5.108 4.49c.624.556 1.524.027 1.524-.893v-1.928h2a3.023 3.023 0 0 1 3 3.046V19a5.593 5.593 0 0 0-1.5-10.954Z" />

                    <svg class="w-6 h-6 text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                        <path stroke="rgb(45, 45, 91)" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.83892 12.4543s1.24988-3.08822-.21626-5.29004C8.15656 4.96245 4.58671 4.10885 4.39794 4.2436c-.18877.13476-1.11807 3.32546.34803 5.52727 1.4661 2.20183 5.09295 2.68343 5.09295 2.68343Zm0 0C10.3389 13.4543 12 15 12 18v2c0-2-.4304-3.4188 2.0696-5.9188m0 0s-.4894-2.7888 1.1206-4.35788c1.6101-1.56907 4.4903-1.54682 4.6701-1.28428.1798.26254.4317 2.84376-1.0809 4.31786-1.61 1.5691-4.7098 1.3243-4.7098 1.3243Z"/>
