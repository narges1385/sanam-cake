<!DOCTYPE html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SanamCake</title>
    <style>
        @font-face {
            font-family: "font";
            src: url("fonts/El_Messiri/ElMessiri-VariableFont_wght.ttf"), url("fonts/Vazirmatn/Vazirmatn-VariableFont_wght.ttf");
            font-weight: bold;
            font-display: swap;
        }

        body {
            background-color: rgb(173, 52, 82);
            font-family: "font";
        }

        .main {
            text-align: center;
            min-height: 100vh;
            margin: 3%;
            border-radius: 40px;
            box-shadow: 6px 6px 15px rgb(53, 53, 53), -6px -6px 15px rgb(53, 53, 53);
            background-color: rgb(255, 156, 181);
        }

        header {
            display: flex;
            justify-content: space-between;
            padding: 30px 25px 0;
            height: 30px;
            align-items: center;
        }

        .icon {
            display: flex;
            height: 30px;
            align-items: center;
            grid-area: 10px;
        }

        .call {
            position: relative;
        }

        .call ul {
            display: none;
            list-style: none;
            padding-left: 0;
            margin-top: 0;
            z-index: 1;
            background-color: rgb(169, 70, 113);
            border-radius: 10px;
            font-size: 20px;
        }

        .call li {
            padding: 10px;
            color: bisque;
        }

        .call a {
            color: bisque;
        }

        .call li:first-child {
            border-bottom: 1.5px solid bisque;
        }

        .call.active ul {
            display: flex;
            position: absolute;
            right: 0;
            flex-direction: column;
        }

        .call:hover, .call:active{
            cursor: pointer;
        }

        .option {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 24px;
        }

        .option a {
            color: rgb(147, 166, 132);
        }

        .call button {
            all: unset;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 24px;
            color: rgb(147, 166, 132);
        }
        

        h1 {
            color: rgb(113, 11, 53);
            font-size: 30px;
            margin: 0;
        }

        .items {
            list-style-type: none;
            margin: 0;
            padding: 2% 0;
            align-items: center;
        }

        a {
            text-decoration: none;
            font-size: 5vw;
            color: rgb(40, 66, 46);
        }

        .items li {
            background-size: contain;
            padding: 10%;
            margin: 6%;
            background-repeat: no-repeat;
            background-color: rgb(179, 204, 159);
            border-radius: 35px;
            box-shadow: 2px 2px 15px rgb(153, 65, 103), -2px -2px 15px rgb(153, 65, 103);
            position: relative;
            overflow: hidden;
        }

        .items li:hover a::before,
        .items li:active a::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to top, rgba(44, 44, 44, 0.459), transparent);
        }
    </style>
</head>

<script>
    let timer;
    let active_copy = null;

    const call = document.getElementById("call");

    function copy(num, el, event) {
        
        event.stopPropagation();

        navigator.clipboard.writeText(num);

        
        if(active_copy && active_copy != el){
            resetButton(active_copy);
        }

        el.innerHTML = `<svg class="w-6 h-6 text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 4h3a1 1 0 0 1 1 1v15a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1h3m0 3h6m-6 7 2 2 4-4m-5-9v4h4V3h-4Z" />
                </svg>`;
        active_copy = el;

        clearTimeout(timer);
        
        timer = setTimeout(() => {
            resetButton(el);
            active_copy = null;
        }, 3000);
        setTimeout(() => {
            call.classList.remove("active");
        }, 4000);
    }
    function resetButton(el){
        el.innerHTML =
                `<svg class="w-6 h-6 text-gray-800 dark:text-white" aria-hidden="true"
                xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor"
                viewBox="0 0 24 24">
                <path fill-rule="evenodd"
                d="M18 3a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2h-1V9a4 4 0 0 0-4-4h-3a1.99 1.99 0 0 0-1 .267V5a2 2 0 0 1 2-2h7Z"
                clip-rule="evenodd" />
                <path fill-rule="evenodd"
                d="M8 7.054V11H4.2a2 2 0 0 1 .281-.432l2.46-2.87A2 2 0 0 1 8 7.054ZM10 7v4a2 2 0 0 1-2 2H4v6a2 2 0 0 0 2 2h7a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3Z"
                clip-rule="evenodd" />
                </svg>`;
    }
    function toggle(el){
        el.classList.toggle("active");
    }

</script>
