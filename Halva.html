<!DOCTYPE html>
<html>

<head>
    <title>Halva</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        @font-face {
            font-family: "font";
            src: url("fonts/El_Messiri/ElMessiri-VariableFont_wght.ttf"), url("fonts/Vazirmatn/Vazirmatn-VariableFont_wght.ttf");
            font-weight: bold;
            font-display: swap;
        }

        body {
            background-color: #65643a;
            font-family: "font";
        }

        .main {
            text-align: center;
            min-height: 100vh;
            margin: 3%;
            border-radius: 40px;
            box-shadow: 6px 6px 15px rgb(53, 53, 53), -6px -6px 15px rgb(53, 53, 53);
            background-color: #d9caac;
        }

        h3 {
            font-size: 5vw;
            display: inline-block;
            border-radius: 500px 550px 350px 250px;
            background-color: #65643a;
            padding: 4vw;
            color: rgb(231, 225, 218);
            margin: 3vw;
        }

        img {
            width: 60vw;
            margin: 7vw 0;
            border-radius: 200px 250px 300px 250px;
            border: solid 10px #4d5a3d;
            box-shadow: 25px 25px #65643a;
        }
    </style>
</head>

<body>
    <div class="main">
        <h3>قیمت کیلویی : 490,000 تومان</h3>
        <h3> قیمت پک 24 عددی تارت حلوا : 390,000 تومان</h3>
        <img src="photo/halva.png">
    </div>
</body>

</html>
