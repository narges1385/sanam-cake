<!DOCTYPE html>
<html>

<head>
    <title>Halva</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        @font-face {
            font-family: "font";
            src: url("fonts/El_Messiri/ElMessiri-VariableFont_wght.ttf"), url("fonts/Vazirmatn/Vazirmatn-VariableFont_wght.ttf");
            font-weight: bold;
            font-display: swap;
        }

        body {
            background-color: #65643a;
            font-family: "font";
        }

        .main {
            text-align: center;
            min-height: 100vh;
            margin: 4%;
            border-radius: 40px;
            box-shadow: 6px 6px 15px rgb(53, 53, 53), -6px -6px 15px rgb(53, 53, 53);
            background-color: #d9caac;
        }

        header {
            display: flex;
            align-items: center;
            margin: 0 10px;
            justify-content: space-between;
        }

        h1 {
            color: #65643a;
            font-size: 24px;
        }

        a {
            color: #65643a;
        }

        .price{
            display: flex;
            flex-direction: column;
            margin-right: 5px;
        }

        .about{
            display: flex;
            flex-direction: row-reverse;
            align-items: center;
            gap: 5px;
            height: 20px;
        }

        p {
            font-size: 20px;
            display: inline-block;
            color: rgba(84, 54, 19, 0.854);
            direction: rtl;
        }

        img {
            width: 90%;
            margin: 20px 0 25px;
            border-radius: 30px;
            box-shadow: 3px 3px 10px #434327;
        }

        @media screen and (min-width:768px){
            .main{
                width: 500px;
                margin: 3% auto;
            }
        }
    </style>
</head>

<body>
    <div class="main">
        <header>
            <a href="index.html">
                <svg class="w-6 h-6 text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg"

</html>
