<!DOCTYPE html>
<html>

<head>
    <title>RollCake</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        @font-face {
            font-family: "font";
            src: url("fonts/El_Messiri/ElMessiri-VariableFont_wght.ttf"), url("fonts/Vazirmatn/Vazirmatn-VariableFont_wght.ttf");
            font-weight: bold;
            font-display: swap;
        }

        body {
            background-color: rgb(67, 41, 39);
            font-family: "font";
        }

        .main {
            text-align: center;
            min-height: 100vh;
            margin: 3%;
            border-radius: 40px;
            padding: 1% 0;
            box-shadow: 6px 6px 20px rgb(24, 24, 24), -6px -6px 20px rgb(24, 24, 24);
            background-color: rgb(195, 163, 122);
            padding-bottom: 10vw;
        }

        ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
        }

        .texts .list {
            font-size: 6vw;
            text-align: right;
            background-color: rgb(223, 211, 149);
            padding: 3vw;
            padding-right: 7vw;
            margin: 3vw;
            border-radius: 50px;
            border: solid 2px rgb(44, 2, 2);
            border-right: solid 6px rgb(44, 2, 2);
            color: rgb(30, 26, 61);
        }

        .texts .price {
            color: rgb(44, 79, 70);
            font-size: 4.5vw;
            padding-right: 15vw;
        }

        .photo{
            display: grid;
            grid-template-columns: repeat(2,1fr);
            margin: 10vw;
            justify-content: center;
            gap: 3vw;
        }

        .photo img {
            width: 35vw;
            border-radius: 100px;
            border: solid 2px rgb(44, 2, 2);
            border-right: solid 7px rgb(44, 2, 2);
            border-bottom: solid 7px rgb(44, 2, 2);
        }


        p {
            display: inline;
            font-size: 6vw;
            text-align: right;
            background-color: rgb(223, 211, 149);
            padding: 1vw 7vw;
            margin-left: 30vw;
            border-radius: 50px;
            border: solid 2px rgb(44, 2, 2);
            border-right: solid 10px rgb(44, 2, 2);
            color: rgb(44, 2, 2);
        }

        .taam ul {
            list-style-type: none;
            margin: 0;
            padding: 2% 0;
            align-items: center;
        }

        .taam li {
            display: inline-block;
            font-size: 6vw;
            color: rgb(44, 2, 2);
            background-repeat: no-repeat;
            padding: 5vw;
            margin: 5vw 1vw 0 1vw;
            background-size: contain;
            background-color: rgb(255, 204, 121);
            text-shadow: 1px 1px 0 rgb(131, 87, 5), -1px -1px 0 rgb(131, 87, 5);
            padding-left: 15vw;
            border-radius: 40px;
            border: solid 3px rgb(44, 2, 2);
        }
    </style>
</head>

<body>
    <div class="main">
        <ul class="texts">
            <div class="list">
                <li><span class="name">رولت</span></li>
                <li><span class="price">قیمت: 370,000‌ تومان</span></li>
            </div>
            <div class="list">
                <li><span class="name">مینی رولت</span></li>
                <li><span class="price">قیمت: 190,000‌ تومان</span></li>
            </div>
            <div class="list">
                <li><span class="name">رولت تک نفره</span></li>
                <li><span class="price">قیمت: 60,000‌ تومان</span></li>
            </div>
        </ul>
        <div class="photo">
            
                <img src="photo/rolet5.png">
           
                <img src="photo/rolet2.png">
            
                <img src="photo/rolet4.png">
            
                <img src="photo/rolet3.png">
            
                <img src="photo/rolet1.png">
            
        </div>
        <p>...در طعم‌های</p>
        <ul class="taam">
            <li style="background-image: url(photo/IMG_4128.JPG);">شکلاتی</li>
            <li style="background-image: url(photo/IMG_E4126.JPG);">وانیلی</li>
            <li style="background-image: url(photo/IMG_4124.JPG);">لوتوس</li>
            <li style="background-image: url(photo/IMG_E4127.JPG);">نسکافه</li>
            <li style="background-image: url(photo/IMG_4135.JPG);">نارگیل</li>
            <li style="background-image: url(photo/IMG_4134.JPG);">کارامل</li>
        </ul>
    </div>
</body>

</html>
