<!DOCTYPE html>
<html>

<head>
    <title>RollCake</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        @font-face {
            font-family: "font";
            src: url("fonts/El_Messiri/ElMessiri-VariableFont_wght.ttf"), url("fonts/Vazirmatn/Vazirmatn-VariableFont_wght.ttf");
            font-weight: bold;
            font-display: swap;
        }

        body {
            background-color: rgb(111, 92, 67);
            font-family: "font";
        }

        .main {
            margin: 6% 3%;
            border-radius: 40px;
            box-shadow: 6px 6px 20px rgb(24, 24, 24), -6px -6px 20px rgb(24, 24, 24);
            background-color: rgb(198, 175, 146);
            padding-bottom: 20px;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 0 5px;
            gap: 200px;
        }

        h1 {
            color: rgb(111, 92, 67);
            margin: 10px;
        }

        a {
            color: rgb(111, 92, 67);
            margin: 5px;
        }

        .item {
            display: flex;
            flex-direction: row-reverse;
            justify-content: space-between;
            align-items: center;
            color: rgb(58, 48, 36);
            margin: 0 5px 0 15px;
        }

        .name{
            display: flex;
            gap: 5px;
            flex-direction: row-reverse;
            align-items: center;
        }

        .price{
            direction: rtl;
        }

        .about{
            margin-bottom: 30px;
        }

        .images {
            display: grid;
            grid-template-columns: 140px 140px;
            justify-content: space-around;
            row-gap: 20px;
        }

        .image {
            position: relative;
            width: 140px;
            height: 180px;
        }

        .image img {
            width: 100%;
            height: 100%;
            border-radius: 20px;
            border: 3px solid rgb(111, 92, 67);
        }

        .image::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: -3px;
            bottom: -3px;
            background: linear-gradient(to top, rgba(61, 50, 37, 0.616), transparent);
            border-radius: 20px;
        }
        .taste{
            margin-top: 20px;
            color: rgb(58, 48, 36);
        }
        
        ul{
            list-style: none;
            display: grid;
            grid-template-columns: repeat(3, 70px);
            gap: 20px;
            padding: 0 10px;
            justify-content: center;
        }

        li{
            width: 70px;
            height: 70px;
            box-shadow:  1px 1px 5px rgb(60, 36, 5);
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
        }
        @media screen and (min-width: 560px){
            .main{
                width: 500px;
                margin: 30px auto;
            }

            .images{
                grid-template-columns: 200px 200px;
                row-gap: 30px;
            }

            .image{
                width: 200px;
                height: 230px;
            }

            ul{
                gap: 20px 30px;
            }
        }
    </style>
</head>

<body>
    <div class="main">
        <header>
            <a href="index.html">
