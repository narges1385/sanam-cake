<!DOCTYPE html>
<html>

<head>
    <title>Baghlava</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        @font-face {
            font-family: "font";
            src: url("fonts/El_Messiri/ElMessiri-VariableFont_wght.ttf"), url("fonts/Vazirmatn/Vazirmatn-VariableFont_wght.ttf");
            font-weight: bold;
            font-display: swap;
        }

        body {
            background-color: #b26c26;
            font-family: "font";
        }

        .main {
            text-align: center;
            min-height: 100vh;
            margin: 3%;
            border-radius: 40px;
            box-shadow: 6px 6px 15px rgb(53, 53, 53), -6px -6px 15px rgb(53, 53, 53);
            background-color: #d9caac;
        }

        h3 {
            font-size: 5vw;
            display: inline-block;
            border-radius: 500px 550px 350px 250px;
            background-color: #b26c26;
            padding: 4vw;
            color: rgb(231, 225, 218);
        }

        img {
            width: 60vw;
            margin: 7vw 0;
            border-radius: 350px 400px 500px 500px;
            border: solid 10px #6e4319;
            box-shadow: 25px 25px #b26c26;
        }
    </style>
</head>

<body>
    <div class="main">
        <h3>قیمت: کیلویی 550,000 تومان</h3>
        <img src="photo/IMG_3739.PNG">
    </div>
</body>

</html>
