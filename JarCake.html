<!DOCTYPE html>
<html>

<head>
    <title>JarCake</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        @font-face {
            font-family: "font";
            src: url("fonts/El_Messiri/ElMessiri-VariableFont_wght.ttf"), url("fonts/Vazirmatn/Vazirmatn-VariableFont_wght.ttf");
            font-weight: bold;
            font-display: swap;
        }

        body {
            background-color: rgb(69, 108, 67);
            font-family: "font";
        }

        .main {
            text-align: center;
            margin: 3%;
            border-radius: 40px;
            box-shadow: 3px 3px 10px rgb(53, 53, 53), -6px -6px 15px rgb(53, 53, 53);
            background-color: rgb(184, 179, 167);
        }

        .container {
            display: flex;
        }

        header {
            display: flex;
            align-items: center;
            margin: 0 10px;
            justify-content: space-between;
        }

        h1 {
            color: rgb(105, 81, 44);
            font-size: 24px;
        }

        a {
            color: rgb(105, 81, 44);
        }

        .price {
            display: flex;
            flex-direction: row-reverse;
            margin-right: 20px;
            align-items: center;
        }

        h3 {
            display: inline-block;
            font-size: 20px;
            color: rgb(8, 48, 22);
        }

        img {
            width: 50%;
            border-radius: 300px;
            margin: 20px;
            margin-left: 25px;
            margin-right: 0;
            box-shadow: 2px 2px 5px rgb(40, 40, 40), -2px -2px 5px rgb(40, 40, 40);
        }

        .p {
            color: rgb(200, 197, 189);
            font-size: 20px;
            border-radius: 70px;
            border-bottom-left-radius: 0;
            padding: 10px;
            box-shadow: 5px 5px 0 rgb(64, 27, 27);
            background-color: rgb(93, 68, 34);
            margin: auto 25px;
            display: flex;
            align-items: center;
        }

        @media screen and (min-width: 768px) {
            .main{
                width: 500px;
                margin: 3% auto;
            }
        }
    </style>
</head>

<body>
    <div class="main">
        <header>
            <a href="index.html">
                <svg class="w-6 h-6 text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg"
                    width="30" height="30" fill="none" viewBox="0 0 24 24">
                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M14.5 8.046H11V6.119c0-.921-.9-1.446-1.524-.894l-5.108 4.49a1.2 1.2 0 0 0 0 1.739l5.108 4.49c.624.556 1.524.027 1.524-.893v-1.928h2a3.023 3.023 0 0 1 3 3.046V19a5.593 5.593 0 0 0-1.5-10.954Z" />
                </svg>
            </a>
            <h1>جار کیک</h1>
        </header>
        <div class="price">
            <svg class="w-6 h-6 text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg"
                width="24" height="24" fill="none" viewBox="0 0 24 24">
                <path stroke="rgb(8, 48, 22)" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9.83892 12.4543s1.24988-3.08822-.21626-5.29004C8.15656 4.96245 4.58671 4.10885 4.39794 4.2436c-.18877.13476-1.11807 3.32546.34803 5.52727 1.4661 2.20183 5.09295 2.68343 5.09295 2.68343Zm0 0C10.3389 13.4543 12 15 12 18v2c0-2-.4304-3.4188 2.0696-5.9188m0 0s-.4894-2.7888 1.1206-4.35788c1.6101-1.56907 4.4903-1.54682 4.6701-1.28428.1798.26254.4317 2.84376-1.0809 4.31786-1.61 1.5691-4.7098 1.3243-4.7098 1.3243Z" />
            </svg>
            <h3>قیمت: 50,000 تومان</h3>
        </div>
        <div class="container">
            <img src="photo/jarcake1.JPG">
            <p class="p">شکلاتی</p>
        </div>
        <div class="container">
            <img src="photo/jarcake2.JPG">
            <p class="p">هویج</p>
        </div>
    </div>
</body>

</html>
